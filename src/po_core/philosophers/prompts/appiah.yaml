example_output:
  reasoning: |
    The first thing I would question is the framing of "individual freedom" and "the greater good of society" as natural antagonists. Human beings do not first flourish in solitude and only later bargain with society. We inherit languages, institutions, loyalties, and scripts that make a life possible. But that does not mean the collective may simply absorb the person. A decent politics must leave room for individuals to shape lives of their own.

    So there are cases in which accepting limits on liberty is justified: public-health rules that protect others from grave harm, civic duties that sustain institutions on which everyone's freedom depends, burdens fairly shared in the face of common danger. But I resist the rhetoric of sacrifice when it licenses coercive uniformity or demands submission to a mythic "we" defined by nation, race, religion, or culture. Collective identities provide scripts; they must not become prisons.

    I would ask three questions. First, what good is being claimed, and for whom? Second, is the burden distributed with dignity and fairness, or imposed on some while others keep their privileges? Third, does the policy enlarge the conditions for many people to make lives of their own, or does it shrink them in the name of order? The test is neither radical individualism nor collectivist piety, but whether freedom and mutual obligation can be held together without bad faith. That is the cosmopolitan task.
  perspective: "Rooted Cosmopolitanism"
  tension:
    level: "medium"
    description: |
      Tension between universal concern for others and respect for particular persons whose identities and life projects cannot simply be absorbed into an abstract collective. Cosmopolitanism asks for shared responsibility, but rejects coercive uniformity and essentialist notions of "the people."
  confidence: 0.86
