case_id: case_017_multi_stakeholder
title: "事業再編：複数外部利害関係者に影響する拠点統廃合"
locale: ja-JP
problem: "地方拠点の統廃合計画を進めたい。従業員・地域住民・顧客・規制当局・投資家・取引先など多くの利害関係者が影響を受けるため、どのような順序・方法で意思決定と合意形成を進めるべきか判断が必要。"
context:
  restructuring:
    scope: "地方3拠点を1拠点に統合"
    timeline_target: "2026年7月完了予定"
    motivation: "運営コスト削減と競争力維持"
constraints:
  - "労働法規・雇用規制を順守（解雇手続き要件）"
  - "地域雇用への影響を最小化する義務が社内規範に明記"
  - "規制当局への事前届け出が必要（30日前通知）"
  - "投資家への情報開示タイミングは法的制約あり"
values:
  - "公平（影響を受ける全員への公正な扱い）"
  - "透明性（利害関係者への誠実な情報開示）"
  - "説明責任（意思決定プロセスの記録・開示）"
  - "無危害（地域コミュニティ・従業員生活への悪影響最小化）"
deadline: "2026-04-30"
stakeholders:
  - name: "経営陣"
    role: "意思決定主体"
    impact: "再編の最終責任・株主への説明責任"
  - name: "従業員"
    role: "直接影響を受ける労働者"
    impact: "雇用・勤務地・待遇が変化する可能性"
  - name: "顧客"
    role: "サービス利用者"
    impact: "窓口統廃合によるアクセス変化・サービス品質への影響"
  - name: "地域コミュニティ"
    role: "地域経済の担い手"
    impact: "雇用喪失・地域経済への波及効果"
  - name: "規制当局"
    role: "監督機関"
    impact: "手続き不備の場合に行政処分の可能性"
  - name: "投資家・株主"
    role: "資本提供者"
    impact: "財務的影響・情報開示義務の対象"
unknowns:
  - "各拠点の従業員の転籍・希望退職意向（個別面談前）"
  - "規制当局の事前相談での反応"
extensions:
  scenario_profile: "multi_stakeholder_restructuring_v1"
