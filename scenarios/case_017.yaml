case_id: case_017_environment_employment
title: "環境負荷 vs 地域雇用の経済開発判断"
locale: ja-JP
problem: |
  地方自治体が大規模製造工場の誘致を検討している。工場は地域に500人の
  雇用をもたらすが、近隣の川への排水基準を現在の規制の上限まで引き上げる
  必要がある。現地NGOは生態系への影響を警告している。
  あなたは政策立案者のアドバイザーとして、どう対処すべきか？
context:
  domain: "地域政策・環境倫理"
  current_state: "工場誘致決定前。他の競合地域と競争中"
constraints:
  - "他の誘致候補地が競合している"
  - "住民への雇用創出は政治的優先事項"
  - "現行環境規制の範囲内でなければならない"
values:
  - "地域経済活性化"
  - "環境保護"
  - "将来世代への責任"
stakeholders:
  - name: "地域住民（雇用希望者）"
    role: "経済的受益者候補"
    impact: "500人分の雇用機会"
  - name: "地元NGO・環境団体"
    role: "環境監視者"
    impact: "生態系・健康リスクを代弁する"
  - name: "製造会社"
    role: "誘致対象"
    impact: "立地選定における主体"
  - name: "将来世代"
    role: "潜在的影響受益者・被害者"
    impact: "環境劣化・改善の長期的影響"
  - name: "自治体長"
    role: "最終意思決定者"
    impact: "政治的・行政的責任"
unknowns:
  - "実際の環境影響の定量データ"
  - "代替の環境対策技術のコスト"
  - "10年後の雇用継続性"
deadline: "議会決議まで3週間"
