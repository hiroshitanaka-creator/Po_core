    scope: "顧客向け決済基盤の刷新"
    team_readiness: "開発・テスト完了済み、残タスクは承認・外部検証のみ"
constraints:
  - "顧客との本番切替日を既に通知済み（変更は要再調整）"
  - "延期した場合は最低1週間後の再スケジュールが必要"
  - "セキュリティ上の重大欠陥が発覚した場合はリリース禁止"
values:
