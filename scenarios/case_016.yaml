case_id: case_016_medical_allocation
title: "医療資源の希少下での配分判断"
locale: ja-JP
problem: |
  ICUのベッドが1床しか残っていない状況で、同等の重症度の患者が2人同時に搬送
  されてきた。患者Aは65歳で高齢、患者Bは30歳で幼い子どもを持つ。
  あなたは病院の倫理委員会のコンサルタントとして、どのような判断基準を
  提示すべきか？
context:
  domain: "医療倫理・資源配分"
  current_state: "ICUベッド残1床、同等重症度患者2名が同時搬送"
constraints:
  - "即時判断が必要"
  - "追加資源は見込めない"
  - "医療倫理指針に従う"
  - "最終判断は医師が行う"
values:
  - "命の平等"
  - "最大救命数"
  - "社会的責任"
stakeholders:
  - name: "患者A（65歳）"
    role: "受療候補者"
    impact: "治療の可否が生存に直結"
  - name: "患者B（30歳・子どもあり）"
    role: "受療候補者"
    impact: "治療の可否が生存に直結"
  - name: "担当医師"
    role: "最終意思決定者"
    impact: "判断の倫理的・法的責任を負う"
  - name: "病院倫理委員会"
    role: "方針決定機関"
    impact: "判断基準の正当性を担保する"
  - name: "患者家族"
    role: "関係者"
    impact: "判断結果による直接的な影響を受ける"
unknowns:
  - "両患者の長期回復見通し"
  - "家族状況の詳細"
  - "代替治療の可能性"
deadline: "30分以内"
