case_id: case_016_urgent_unknowns
title: "システムリリース：3日後の本番デプロイ、未解決事項あり"
locale: ja-JP
problem: "3日後に重要な本番システムリリースを控えているが、セキュリティ監査・負荷テスト・主要承認者の確認がまだ完了していない。デプロイを予定通り進めるべきか、延期すべきか判断したい。"
context:
