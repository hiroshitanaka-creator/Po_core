  - "信頼（ステークホルダーへの約束遵守）"
  - "説明責任（判断根拠を透明化する）"
deadline: "2026-03-07"
stakeholders:
  - name: "プロダクトマネージャー"
    role: "意思決定主体"
    impact: "リリース判断の最終責任を持つ"
  - name: "顧客"
    role: "サービス利用者"
    impact: "リリース遅延・品質問題の直接的影響を受ける"
  - name: "開発チーム"
    role: "実装・テスト担当"
    impact: "スケジュール変更・追加作業負荷が発生"
  - name: "セキュリティチーム"
    role: "審査担当"
    impact: "監査完了が判断の前提条件"
unknowns:
  - "セキュリティ監査の結果（重大欠陥の有無）"
