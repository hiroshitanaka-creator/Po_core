case_id: case_023_restorative_justice
title: "加害行為に対する修復的 vs 報復的正義"
locale: ja-JP
problem: |
  職場での深刻なハラスメント事案が発覚した。加害者は長期在職の中堅社員で、
  本人は行為を認め反省を示している。被害者は加害者の解雇ではなく、
  職場環境の改善と謝罪を望んでいる。人事部門はどう判断すべきか？
context:
  domain: "組織倫理・正義論"
  current_state: "ハラスメント事案確認済み。被害者の意向が既知。処分未決定"
constraints:
  - "就業規則上の懲戒規定が存在する"
  - "他の従業員への示しを考慮する必要がある"
  - "法的リスクの管理が必要"
values:
  - "被害者の回復"
  - "公正な処罰"
  - "組織文化の改善"
stakeholders:
  - name: "被害者"
    role: "直接被害者"
    impact: "処分内容と職場環境改善の直接的受益者"
  - name: "加害者"
    role: "行為者"
    impact: "処分と更生機会の両面に影響"
  - name: "他の従業員"
    role: "組織文化の担い手"
    impact: "判断事例が組織規範に与える影響"
  - name: "人事部門"
    role: "意思決定者"
    impact: "処分設計の公正性と法的妥当性"
  - name: "経営層"
    role: "最終承認者"
    impact: "組織文化と法的リスクの最終責任"
unknowns:
  - "被害者の長期的な回復への意向"
  - "加害者の再発リスク"
  - "類似事案の過去処分事例"
deadline: "1週間以内に初回対応"
