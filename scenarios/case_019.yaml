case_id: case_019_whistleblowing
title: "内部告発：組織的損害 vs 忠誠"
locale: ja-JP
problem: |
  あなたは中規模の製薬会社の研究員。副作用データの一部が社内報告書から
  意図的に除外されていることを発見した。現在は承認審査中の薬で、
  除外データが含まれていれば承認が遅れる可能性が高い。
  上司に報告したが「問題ない」と一蹴された。規制当局への告発を検討している。
context:
  domain: "企業倫理・内部告発"
  current_state: "上司への報告済み。内部解決ルートが閉じている"
constraints:
  - "内部告発による雇用リスク"
  - "家族の生活への影響"
  - "守秘義務の範囲の確認が必要"
values:
  - "公共の安全"
  - "組織への忠誠"
  - "誠実さ"
stakeholders:
  - name: "将来の患者"
    role: "潜在的被害者"
    impact: "承認薬の副作用リスクに晒される"
  - name: "研究員本人"
    role: "告発者候補"
    impact: "雇用・評判・生活への影響"
  - name: "製薬会社"
    role: "組織"
    impact: "規制対応・評判・事業継続に影響"
  - name: "規制当局"
    role: "公益保護機関"
    impact: "適切な審査判断が求められる"
  - name: "研究員の家族"
    role: "生活共同体"
    impact: "雇用リスクによる直接的影響"
unknowns:
  - "除外データが実際に承認に影響するか"
  - "内部告発保護制度の実効性"
  - "法的リスクの範囲"
deadline: "審査結果が出る前（2ヶ月以内）"
