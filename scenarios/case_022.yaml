case_id: case_022_risk_collective_safety
title: "個人リスク受容 vs 集団安全の政策判断"
locale: ja-JP
problem: |
  新型ウイルスの変異株が報告され、重症化リスクは低いが感染力は高い。
  公衆衛生当局として、任意のマスク着用推奨か義務化かを決定する必要がある。
  義務化は個人の自由を制限するが、集団免疫形成を早める可能性がある。
context:
  domain: "公衆衛生政策・自由と安全"
  current_state: "変異株拡大中。政策決定前の検討段階"
constraints:
  - "施行力は限られている"
  - "政治的反発が予想される"
  - "科学的不確実性が残る"
values:
  - "個人の自由"
  - "公衆衛生"
  - "社会的連帯"
stakeholders:
  - name: "一般市民"
    role: "政策対象者"
    impact: "自由制限または感染リスクへの曝露"
  - name: "医療従事者"
    role: "最前線対応者"
    impact: "感染者増加による業務負荷"
  - name: "高リスク群（高齢者・基礎疾患）"
    role: "特別保護対象"
    impact: "感染拡大による高い重篤化リスク"
  - name: "公衆衛生当局"
    role: "意思決定者"
    impact: "政策の科学的・政治的正当性責任"
  - name: "経済活動関係者"
    role: "影響受益者・被害者"
    impact: "義務化による経済活動への影響"
unknowns:
  - "変異株の実際の重症化率"
  - "マスク義務化の実際の感染抑制効果"
  - "非遵守率の予測"
deadline: "2週間以内に発表"
