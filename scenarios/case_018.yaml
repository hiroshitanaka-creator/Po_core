case_id: case_018_data_disclosure_harm
title: "個人情報の開示と被害防止の衝突"
locale: ja-JP
problem: |
  SNS上の投稿から、知人が自傷行為を示唆していることに気づいた。
  本人と連絡が取れず、家族の連絡先を知らない。プラットフォームの
  緊急連絡フォームに個人情報を入力して通報すると、利用規約上は
  投稿者の同意なしの第三者開示になる。どうすべきか？
context:
  domain: "プライバシー倫理・危機介入"
  current_state: "SNS投稿を発見。本人との直接連絡は取れていない"
constraints:
  - "本人の明示的同意は得られない"
  - "通報しなかった場合の責任"
  - "プラットフォームの利用規約"
values:
  - "生命の保護"
  - "プライバシーの尊重"
  - "自律性の尊重"
stakeholders:
  - name: "知人（投稿者）"
    role: "保護対象"
    impact: "生命リスクと、同意なき情報開示への影響"
  - name: "通報者（自分）"
    role: "発見者"
    impact: "行動・不作為の法的・倫理的責任"
  - name: "プラットフォーム"
    role: "情報媒介者"
    impact: "規約・緊急対応プロセスの適用責任"
  - name: "知人の家族"
    role: "支援者候補"
    impact: "情報を得た場合に介入可能"
unknowns:
  - "本人の本当の状態（投稿が比喩か実際のリスクか）"
  - "プラットフォームの実際の対応速度"
  - "他に連絡できる人がいるか"
deadline: "即時"
