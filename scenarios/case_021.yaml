case_id: case_021_intercultural_conflict
title: "合弁プロジェクトにおける異文化価値観の衝突"
locale: ja-JP
problem: |
  日本とドイツの合弁事業で、重要な意思決定について両社の文化的慣行が
  衝突している。日本側は全員合意を重視し、ドイツ側は明確な責任者による
  迅速な決定を求める。プロジェクト遅延が発生している。あなたは
  プロジェクトマネージャーとしてどう調停すべきか？
context:
  domain: "異文化経営・組織論"
  current_state: "プロジェクト遅延発生中。両社間の意思決定プロセスが未統一"
constraints:
  - "どちらの文化慣行も『正しくない』とは言えない"
  - "既存の契約関係がある"
  - "プロジェクト期限が固定されている"
values:
  - "集団的調和"
  - "明確な説明責任"
  - "プロジェクト成功"
stakeholders:
  - name: "日本側チーム"
    role: "合意形成推進者"
    impact: "プロセス変更による文化的不適応リスク"
  - name: "ドイツ側チーム"
    role: "迅速決定推進者"
    impact: "プロセス変更による文化的不適応リスク"
  - name: "プロジェクトマネージャー"
    role: "調停者・意思決定者"
    impact: "プロセス設計の責任と評価"
  - name: "両社経営層"
    role: "最終承認者"
    impact: "合弁事業の成功・失敗に直接責任"
unknowns:
  - "両者が実際に受け入れ可能なプロセス"
  - "意思決定の遅延によるコスト定量値"
  - "過去の衝突事例と対処履歴"
deadline: "月末のマイルストーンまで"
