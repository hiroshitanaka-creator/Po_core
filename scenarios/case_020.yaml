case_id: case_020_algorithmic_fairness
title: "アルゴリズムの公平性 vs 効率のトレードオフ"
locale: ja-JP
problem: |
  採用選考にAIシステムを導入した。精度指標は高いが、特定の大学卒業者に
  対して統計的に有利な結果を出すことが分析で判明した。システムを修正
  すると精度が15%下がり、採用コストが増加する。どう対処すべきか？
context:
  domain: "AI倫理・採用システム"
  current_state: "AIシステム稼働中。バイアス発見後の対応検討段階"
constraints:
  - "採用予算は固定"
  - "競合他社もAI採用を導入済み"
  - "労働法・差別禁止法の遵守が必要"
values:
  - "機会の平等"
  - "組織の効率"
  - "透明性"
stakeholders:
  - name: "非優遇大学出身の応募者"
    role: "被影響者"
    impact: "不当な不利益を受ける可能性"
  - name: "採用担当者"
    role: "システム利用者"
    impact: "判断の正確性と効率性に依存"
  - name: "経営層"
    role: "意思決定者"
    impact: "コスト・品質・法的リスクの最終責任"
  - name: "AIシステムベンダー"
    role: "技術提供者"
    impact: "修正対応の責任共有"
  - name: "社会"
    role: "公益代表"
    impact: "公平な採用機会の確保"
unknowns:
  - "バイアスの根本原因"
  - "法的リスクの範囲"
  - "修正後の採用品質への長期的影響"
deadline: "次回採用サイクル開始まで6週間"
