name: import-guard

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  import-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4
      - uses: actions/setup-python@42375524ee3024772b51489007bcc066979e22c1  # v5
        with:
          python-version: "3.11"
      - name: Run import graph checks
        run: python tools/import_graph.py --check --print
